name: CI - Build, Test and Smoke Test

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Laboratorio4/spring-app-template/spring-app-template

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw clean test -B

  smoke-test-compose:
    needs: build-and-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Laboratorio4/spring-app-template/spring-app-template

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat <<EOF > .env
          SPRING_APPLICATION_NAME=spring-app-template
          CORS_ALLOWED_ORIGINS=http://localhost:5173
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/laboratorio4
          SPRING_DATASOURCE_USERNAME=postgres
          SPRING_DATASOURCE_PASSWORD=postgres
          SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
          SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
          SPRING_JPA_HIBERNATE_DDL_AUTO=update
          SPRING_JPA_SHOW_SQL=false
          SERVER_PORT=4000
          SECURITY_JWT_SECRET_KEY=VGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1oczI1Ni0yMDI2
          SECURITY_JWT_EXPIRATION_TIME=3600000
          POSTGRES_DB=laboratorio4
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          EOF

      - name: Start containers
        run: docker compose up --build -d

      - name: Smoke test
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000 || true)

            if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "Application responded with HTTP $STATUS"
              exit 0
            fi

            echo "Waiting for app... attempt $i, status=$STATUS"
            docker compose ps
            sleep 5
          done

          echo "Application did not respond on time"
          docker compose logs
          exit 1

      - name: Shutdown containers
        if: always()
        run: docker compose down -v